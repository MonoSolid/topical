name: "Publish to nuget"

on: 
  release:
    types: [published]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
  
    permissions:
      id-token: write  # enable GitHub OIDC token issuance for this job
      
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          
      - name: Restore dependencies
        run: dotnet restore
        
      - name: Build
        run: dotnet build --configuration Release --no-restore
        
      - name: Pack
        run: dotnet pack -p:PackageVersion=${{ github.event.release.name }} --no-restore --no-build --configuration Release --output packages -p:IncludeSymbols=true -p:SymbolPackageFormat=snupkg 
        
        # Get a short-lived NuGet API key
      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}
    
      # Push the package
      - name: NuGet push
        run: dotnet nuget push packages/topical.${{ github.event.release.name }}.nupkg --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json
